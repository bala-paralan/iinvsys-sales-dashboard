version: '3.9'

services:
  # ── MongoDB ──────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: iinvsys_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: iinvsys
    volumes:
      - mongo_data:/data/db
    ports:
      - '27018:27017'          # 27018 avoids conflict with any host-level mongod
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── API Server ───────────────────────────────────────────────────
  api:
    build: .
    container_name: iinvsys_api
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5050                          # Nginx proxies to this port
      MONGO_URI: mongodb://mongo:27017/iinvsys
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      # Leave CORS_ORIGINS empty — frontend is served from the same Nginx host,
      # so the browser Origin matches the server. Restricting it causes 500s.
      CORS_ORIGINS: ''
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@iinvsys.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-Admin@123}
    ports:
      - '5050:5050'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:5050/api/health']
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  mongo_data:
    driver: local
